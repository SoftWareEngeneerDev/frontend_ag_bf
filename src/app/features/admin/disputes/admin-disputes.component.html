<div>
  <div class="flex-between mb-20">
    <div>
      <h2 class="font-display" style="font-size:20px;font-weight:700;margin-bottom:4px">Litiges</h2>
      <p class="text-muted" style="font-size:13px">
        {{ openCount }} litige(s) ouvert(s) —
        {{ urgentCount }} urgents
      </p>
    </div>
    <span class="badge-err">
      <i class="fa-solid fa-triangle-exclamation"></i> {{ urgentCount }} urgents
    </span>
  </div>

  <div class="tab-nav mb-24">
    <button class="tab-btn" *ngFor="let t of tabs"
            [class.active]="activeTab === t"
            (click)="activeTab = t">{{ t }}</button>
  </div>

  <!-- Loader -->
  <app-loading-spinner *ngIf="loading" [full]="true"></app-loading-spinner>

  <!-- Empty -->
  <app-empty-state *ngIf="!loading && filtered.length === 0"
    icon="fa-solid fa-gavel" title="Aucun litige"
    description="Aucun litige dans cette catégorie.">
  </app-empty-state>

  <div class="dis-list" *ngIf="!loading">
    <div class="glass dis-card" *ngFor="let d of filtered"
         [style.borderColor]="d.urgent ? 'rgba(255,77,106,.3)' : 'var(--border)'">

      <div class="dis-head">
        <div class="dis-left">
          <div class="flex gap-8" style="align-items:center;margin-bottom:4px">
            <span class="font-mono" style="font-size:11px;color:var(--muted)">{{ d.id }}</span>
            <span *ngIf="d.urgent" class="badge-err" style="font-size:10px">
              <i class="fa-solid fa-bolt"></i> Urgent
            </span>
          </div>
          <div class="font-display" style="font-weight:700;font-size:15px;margin-bottom:3px">{{ d.reason }}</div>
          <div class="text-muted" style="font-size:12px">
            Plaignant : <strong style="color:var(--txt)">{{ d.reporter }}</strong>
            <ng-container *ngIf="d.product !== 'N/A'">
              · Réf : <strong style="color:var(--txt)">{{ d.product }}</strong>
            </ng-container>
          </div>
        </div>
        <div class="dis-right">
          <span [class]="statusClass(d.status)">{{ statusLabel(d.status) }}</span>
          <div class="text-muted" style="font-size:11px;margin-top:6px">{{ d.date }}</div>
        </div>
      </div>

      <div class="dis-actions">
        <!-- ── Ouvert ── -->
        <ng-container *ngIf="d.status === 'OPEN'">
          <button class="btn-cyan  btn-sm" (click)="takeCharge(d)">
            <i class="fa-solid fa-magnifying-glass"></i> Prendre en charge
          </button>
          <button class="btn-ok    btn-sm" (click)="resolve(d)">
            <i class="fa-solid fa-circle-check"></i> Résoudre
          </button>
          <button class="btn-ghost btn-sm">
            <i class="fa-solid fa-envelope"></i> Contacter parties
          </button>
        </ng-container>

        <!-- ── En cours ── -->
        <ng-container *ngIf="d.status === 'IN_REVIEW'">
          <button class="btn-gold  btn-sm" (click)="refund(d)">
            <i class="fa-solid fa-sack-dollar"></i> Rembourser
          </button>
          <button class="btn-ok    btn-sm" (click)="resolve(d)">
            <i class="fa-solid fa-lock"></i> Clôturer
          </button>
          <button class="btn-ghost btn-sm">
            <i class="fa-solid fa-envelope"></i> Message
          </button>
        </ng-container>

        <!-- ── Résolu ── -->
        <ng-container *ngIf="d.status === 'RESOLVED' || d.status === 'CLOSED'">
          <button class="btn-ghost btn-sm">
            <i class="fa-solid fa-eye"></i> Voir détails
          </button>
        </ng-container>
      </div>

    </div>
  </div>
</div>
