<div>
  <div class="flex-between mb-20">
    <div>
      <h2 class="font-display" style="font-size:20px;font-weight:700;margin-bottom:4px">Utilisateurs</h2>
      <p class="text-muted" style="font-size:13px">{{ filtered.length }} utilisateur(s) affiché(s)</p>
    </div>
    <input class="inp" style="width:260px" placeholder="🔍  Rechercher nom, téléphone..."
           [(ngModel)]="search">
  </div>

  <div class="tab-nav mb-24">
    <button class="tab-btn" *ngFor="let t of tabs"
            [class.active]="activeTab === t"
            (click)="activeTab = t">{{ t }}</button>
  </div>

  <div class="glass">
    <table class="tbl">
      <thead>
        <tr><th>Utilisateur</th><th>Téléphone</th><th>Rôle</th><th>Statut</th><th>Score</th><th>Groupes</th><th>Inscrit le</th><th>Actions</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of filtered">
          <td>
            <div class="flex gap-10" style="align-items:center">
              <app-avatar [name]="u.name" [size]="32" [bg]="u.role === 'SUPPLIER' ? '#00D4FF' : '#F5A623'"></app-avatar>
              <span style="font-weight:500">{{ u.name }}</span>
            </div>
          </td>
          <td class="font-mono text-muted" style="font-size:12px">{{ u.phone }}</td>
          <td><span [class]="u.role === 'SUPPLIER' ? 'badge-cyan' : 'badge-grey'">{{ u.role === 'SUPPLIER' ? 'Fournisseur' : 'Membre' }}</span></td>
          <td><span [class]="u.status === 'ACTIVE' ? 'badge-ok' : 'badge-err'">{{ u.status === 'ACTIVE' ? 'Actif' : 'Suspendu' }}</span></td>
          <td>
            <div class="flex gap-6" style="align-items:center">
              <div class="prog-wrap" style="width:50px;height:4px"><div class="prog-fill" [style.width.%]="u.score"></div></div>
              <span class="font-mono" style="font-size:12px;color:var(--gold)">{{ u.score }}</span>
            </div>
          </td>
          <td class="font-mono" style="text-align:center">{{ u.groups }}</td>
          <td class="text-muted" style="font-size:12px">{{ u.joined }}</td>
          <td>
            <div class="flex gap-6">
              <button class="btn-ghost btn-sm" [routerLink]="['/admin/users', u.id]">Voir</button>
              <button class="btn-err btn-sm" *ngIf="u.status === 'ACTIVE'">Suspendre</button>
              <button class="btn-ok   btn-sm" *ngIf="u.status === 'SUSPENDED'">Réactiver</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
