<div>
  <div class="flex-between mb-20">
    <h2 class="font-display" style="font-size:20px;font-weight:700">Fournisseurs</h2>
    <span class="badge-warn">{{ pendingCount }} en attente de validation</span>
  </div>

  <div class="tab-nav mb-24">
    <button class="tab-btn" *ngFor="let t of tabs"
            [class.active]="activeTab === t"
            (click)="activeTab = t">{{ t }}</button>
  </div>

  <div class="sup-grid">
    <div class="glass sup-card" *ngFor="let s of filtered">
      <div class="sup-head">
        <div class="sup-icon"><i class="fa-solid fa-store"></i></div>
        <div class="sup-info">
          <div class="font-display" style="font-weight:700;font-size:15px;margin-bottom:3px">{{ s.companyName }}</div>
          <div class="text-muted" style="font-size:12px">{{ s.contactName }} · {{ s.city }}</div>
        </div>
        <span [class]="statusClass(s.status)">{{ statusLabel(s.status) }}</span>
      </div>

      <div class="sup-stats" *ngIf="s.status === 'APPROVED'">
        <div class="ss-item" *ngFor="let st of [
          {v:s.totalGroups.toString(), l:'Groupes'},
          {v:s.successRate+'%',         l:'Succès'},
          {v:s.rating.toString()+'/5',  l:'Note'},
          {v:s.reviewCount.toString(),  l:'Avis'}
        ]">
          <div class="font-mono ss-val">{{ st.v }}</div>
          <div class="text-muted ss-lbl">{{ st.l }}</div>
        </div>
      </div>

      <div class="sup-contact text-muted">
        <span><i class="fa-solid fa-envelope"></i> {{ s.email }}</span>
        <span><i class="fa-solid fa-phone"></i> {{ s.phone }}</span>
      </div>

      <div class="sup-actions">
        <ng-container *ngIf="s.status === 'PENDING'">
          <button class="btn-gold btn-sm" style="flex:1;justify-content:center"><i class="fa-solid fa-circle-check"></i> Approuver</button>
          <button class="btn-err  btn-sm" style="flex:1;justify-content:center">
            <i class="fa-solid fa-xmark"></i> Rejeter
          </button>
        </ng-container>
        <ng-container *ngIf="s.status === 'APPROVED'">
          <button class="btn-ghost btn-sm" style="flex:1;justify-content:center">Voir profil</button>
          <button class="btn-err   btn-sm">Suspendre</button>
        </ng-container>
      </div>
    </div>
  </div>
</div>
