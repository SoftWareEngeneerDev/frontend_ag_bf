<div class="mg-page">

  <!-- Onglets filtres -->
  <div class="tab-nav mb-24">
    <button class="tab-btn" *ngFor="let t of tabList"
            [class.active]="activeTab === t.key"
            (click)="setTab(t.key)">
      <i [class]="t.icon"></i> {{ t.label }}
      <span *ngIf="t.count > 0" class="tab-count">{{ t.count }}</span>
    </button>
  </div>

  <app-loading-spinner *ngIf="loading" [full]="true"></app-loading-spinner>

  <app-empty-state *ngIf="!loading && filtered.length === 0"
    icon="fa-solid fa-users" title="Aucun groupe dans cette catégorie"
    description="Vous n'avez pas encore de groupe ici.">
    <a routerLink="/groups" class="btn-gold">Rejoindre un groupe</a>
  </app-empty-state>

  <div class="mg-grid" *ngIf="!loading && filtered.length > 0">
    <app-group-card
      *ngFor="let g of filtered"
      [group]="g"
      [memberView]="true"
      (join)="onJoin(g)"
      (details)="goDetail(g)">
    </app-group-card>
  </div>

</div>
