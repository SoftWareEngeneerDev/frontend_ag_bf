<div class="auth-wrap">
  <div class="auth-left">
    <app-logo [size]="20"></app-logo>
    <div class="al-center">
      <div class="al-icon">🔐</div>
      <h2 class="font-display al-title">Réinitialisez votre <span class="text-gold">mot de passe</span></h2>
    </div>
    <p class="text-muted al-footer">© 2024 AchatGroupéBF</p>
  </div>

  <div class="auth-right">
    <div class="auth-form-wrap">

      <!-- Étape 1 : numéro -->
      <ng-container *ngIf="step === 1">
        <h2 class="font-display auth-title">Mot de passe oublié ?</h2>
        <p class="text-muted auth-sub">Entrez votre numéro pour recevoir un code de réinitialisation</p>
        <div class="auth-form">
          <div class="inp-group">
            <label>Téléphone</label>
            <div class="inp-prefix">
              <div class="prefix">🇧🇫 +226</div>
              <input class="inp" [(ngModel)]="phone" placeholder="76 52 86 09">
            </div>
          </div>
          <button class="btn-gold btn-blk btn-lg" (click)="sendCode()">Envoyer le code →</button>
          <div class="auth-switch">
            <a routerLink="/auth/login" class="text-gold-c">← Retour à la connexion</a>
          </div>
        </div>
      </ng-container>

      <!-- Étape 2 : OTP -->
      <ng-container *ngIf="step === 2">
        <app-otp [phone]="'+226 ' + phone" (verified)="onVerified()" (back)="step = 1"></app-otp>
      </ng-container>

      <!-- Étape 3 : Nouveau mot de passe -->
      <ng-container *ngIf="step === 3">
        <h2 class="font-display auth-title">Nouveau mot de passe</h2>
        <p class="text-muted auth-sub">Choisissez un mot de passe sécurisé</p>
        <div class="auth-form">
          <div class="inp-group">
            <label>Nouveau mot de passe</label>
            <input class="inp" type="password" placeholder="••••••••">
          </div>
          <div class="inp-group">
            <label>Confirmer le mot de passe</label>
            <input class="inp" type="password" placeholder="••••••••">
          </div>
          <div class="alert-ok alert">✅ Votre code OTP a été vérifié avec succès !</div>
          <button class="btn-gold btn-blk btn-lg" (click)="goLogin()">Enregistrer et se connecter →</button>
        </div>
      </ng-container>
    </div>
  </div>
</div>
