<div class="otp-wrap text-center">
  <div class="otp-icon">📱</div>
  <h2 class="font-display otp-title">Vérifiez votre numéro</h2>
  <p class="text-muted otp-sub">Code envoyé au</p>
  <p class="font-mono otp-phone">{{ phone }}</p>

  <div class="otp-inputs">
    <input class="otp-box"
           *ngFor="let d of digits; let i = index"
           [value]="digits[i]"
           maxlength="1"
           inputmode="numeric"
           (input)="onInput($event, i)"
           (keydown)="onKeydown($event, i)">
  </div>

  <div class="otp-timer text-muted">
    <span *ngIf="!canResend">
      Renvoyer le code dans <span class="font-mono" style="color:var(--err)">{{ timerLabel }}</span>
    </span>
    <button *ngIf="canResend" class="btn-ghost btn-sm" (click)="resend()">
      🔄 Renvoyer le code
    </button>
  </div>

  <button class="btn-ghost btn-blk" style="margin-top:12px" (click)="back.emit()">
    ← Modifier le numéro
  </button>
</div>
