<div class="otp-wrap text-center">
  <div class="otp-icon"><i class="fa-solid fa-mobile-screen-button"></i></div>
  <h2 class="font-display otp-title">Vérifiez votre numéro</h2>
  <p class="text-muted otp-sub">Code envoyé au</p>
  <p class="font-mono otp-phone">{{ phone }}</p>

  <div class="otp-inputs">
    <input
      class="otp-box"
      *ngFor="let d of digits; let i = index"
      type="text"
      inputmode="numeric"
      maxlength="1"
      [value]="digits[i]"
      (input)="onInput($event, i)"
      (keydown)="onKeydown($event, i)"
      (paste)="i === 0 ? onPaste($event) : null"
      autocomplete="one-time-code">
  </div>

  <div class="otp-timer text-muted" style="margin-top:16px">
    <span *ngIf="!canResend">
      Renvoyer le code dans
      <span class="font-mono" style="color:var(--err)">{{ timerLabel }}</span>
    </span>
    <button *ngIf="canResend" class="btn-ghost btn-sm"
            (click)="resend()" [disabled]="resendLoading">
      <i *ngIf="resendLoading" class="fa-solid fa-spinner fa-spin"></i>
      <span *ngIf="!resendLoading">🔄 Renvoyer le code</span>
      <span *ngIf="resendLoading">Envoi en cours...</span>
    </button>
  </div>

  <button class="btn-ghost btn-blk" style="margin-top:12px" (click)="back.emit()">
    ← Modifier le numéro
  </button>
</div>
