<div>
  <div class="kpi-grid mb-24">
    <app-stats-card *ngFor="let k of kpis"
      [icon]="k.icon" [value]="k.val" [label]="k.label" [sub]="k.sub" [color]="k.color">
    </app-stats-card>
  </div>

  <div class="sup-grid mb-24">
    <!-- Bar chart revenus -->
    <div class="glass p-24">
      <h3 class="font-display sup-chart-title">Ventes des 6 derniers mois</h3>
      <div class="bar-chart">
        <div class="bar-col" *ngFor="let v of chartData; let i = index">
          <div class="bar-val text-muted">{{ (v/1000).toFixed(1) }}k</div>
          <div class="bar-fill" [style.height.%]="(v/chartMax)*100" [class.active]="i === chartData.length-1"></div>
          <div class="bar-lbl text-muted">{{ chartMonths[i] }}</div>
        </div>
      </div>
    </div>

    <!-- Donut statuts groupes -->
    <div class="glass p-24">
      <h3 class="font-display sup-chart-title">Statut des groupes</h3>
      <div class="donut-wrap">
        <div class="donut"></div>
      </div>
      <div class="donut-legend">
        <div class="dl-item" *ngFor="let d of [{c:'#F5A623',l:'Actifs',v:5},{c:'#00D4FF',l:'Seuil atteint',v:2},{c:'#10D98B',l:'Terminés',v:8}]">
          <div class="dl-dot" [style.background]="d.c"></div>
          <span class="text-muted dl-label">{{ d.l }}</span>
          <span class="font-mono dl-val" [style.color]="d.c">{{ d.v }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Commandes urgentes -->
  <div class="glass p-20">
    <div class="flex gap-8 mb-16" style="align-items:center">
      <h3 class="font-display" style="font-size:16px;font-weight:700">⚠️ Commandes urgentes</h3>
      <span class="badge-err">3 en attente</span>
    </div>
    <table class="tbl">
      <thead><tr><th>Groupe</th><th>Produit</th><th>Participants</th><th>Montant</th><th>Statut</th><th>Action</th></tr></thead>
      <tbody>
        <tr *ngFor="let o of urgentOrders">
          <td>{{ o.group }}</td>
          <td class="text-muted">{{ o.product }}</td>
          <td><span class="badge-ok">{{ o.participants }}</span></td>
          <td class="font-mono" style="color:var(--gold);font-weight:700">{{ o.amount }}</td>
          <td><span [class]="statusClass(o.status)">{{ o.status }}</span></td>
          <td><button class="btn-gold btn-sm">Traiter</button></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
