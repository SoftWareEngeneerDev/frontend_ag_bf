<div>
  <div class="flex-between so-header">
    <div>
      <h2 class="font-display" style="font-size:20px;font-weight:700;margin-bottom:4px">Commandes</h2>
      <p class="text-muted" style="font-size:13px">{{ filtered.length }} commande(s)</p>
    </div>
    <div class="flex gap-8">
      <span class="badge-err" *ngIf="mockOrders[0].status === 'CREATED'">⚠️ 1 à confirmer</span>
    </div>
  </div>

  <div class="tab-nav mb-24">
    <button class="tab-btn" *ngFor="let t of tabs"
            [class.active]="activeTab === t"
            (click)="setTab(t)">{{ t }}</button>
  </div>

  <table class="tbl">
    <thead>
      <tr>
        <th>Commande</th>
        <th>Produit</th>
        <th>Groupe / Acheteur</th>
        <th>Qté</th>
        <th>Montant</th>
        <th>Statut</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let o of filtered">
        <td class="font-mono" style="font-size:12px;color:var(--muted)">{{ o.id }}</td>
        <td>
          <div class="flex gap-8" style="align-items:center">
            <span style="font-size:20px">{{ o.emoji }}</span>
            <span style="font-size:13px;font-weight:500">{{ o.product | truncate:22 }}</span>
          </div>
        </td>
        <td>
          <div style="font-size:13px">{{ o.group }}</div>
          <div class="text-muted" style="font-size:11px">{{ o.buyer }}</div>
        </td>
        <td class="font-mono" style="font-weight:700">{{ o.qty }}</td>
        <td class="font-mono" style="color:var(--gold);font-weight:700">{{ o.amount | currencyXof }}</td>
        <td><span [class]="statusClass(o.status)">{{ statusLabel(o.status) }}</span></td>
        <td class="text-muted" style="font-size:12px">{{ o.date }}</td>
        <td>
          <button class="btn-gold btn-sm" *ngIf="nextAction(o.status)">
            {{ nextAction(o.status) }}
          </button>
          <ng-container *ngIf="o.status === 'SHIPPED'">
            <button class="btn-ghost btn-sm">Voir suivi</button>
          </ng-container>
        </td>
      </tr>
    </tbody>
  </table>
</div>
