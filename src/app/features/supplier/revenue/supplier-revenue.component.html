<div>
  <div class="kpi-grid mb-24">
    <app-stats-card *ngFor="let k of kpis"
      [icon]="k.icon" [value]="k.val" [label]="k.label" [sub]="k.sub" [color]="k.color">
    </app-stats-card>
  </div>

  <!-- Bar chart -->
  <div class="glass p-24 mb-24">
    <h3 class="font-display" style="font-size:15px;font-weight:700;margin-bottom:18px">
      Évolution des revenus (6 derniers mois)
    </h3>
    <div class="rev-chart">
      <div class="rev-col" *ngFor="let r of revData; let i = index">
        <div class="rev-val text-muted">{{ (r.revenue/1000000).toFixed(1) }}M</div>
        <div class="rev-bar" [style.height.%]="(r.revenue/revMax)*100"
             [class.active]="i === revData.length - 1"></div>
        <div class="rev-lbl text-muted">{{ r.month }}</div>
      </div>
    </div>
    <div class="rev-legend">
      <div class="rev-leg-item">
        <div class="rev-leg-dot" style="background:var(--gold)"></div>
        <span class="text-muted">Revenu brut</span>
      </div>
      <div class="rev-leg-item">
        <div class="rev-leg-dot" style="background:var(--err)"></div>
        <span class="text-muted">Commission (7%)</span>
      </div>
    </div>
  </div>

  <!-- Transactions -->
  <div class="glass p-20">
    <h3 class="font-display" style="font-size:15px;font-weight:700;margin-bottom:16px">
      Historique des transactions
    </h3>
    <table class="tbl">
      <thead>
        <tr><th>Date</th><th>Description</th><th>Type</th><th>Montant</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let t of transactions">
          <td class="text-muted" style="font-size:12px;white-space:nowrap">{{ t.date }}</td>
          <td style="font-size:13px">{{ t.desc }}</td>
          <td>
            <span class="badge" [style.background]="t.color+'15'" [style.color]="t.color"
                  [style.border]="'1px solid '+t.color+'30'">{{ t.type }}</span>
          </td>
          <td class="font-mono" style="font-weight:700" [style.color]="t.amount > 0 ? 'var(--ok)' : 'var(--err)'">
            {{ t.amount > 0 ? '+' : '' }}{{ t.amount | currencyXof }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
