<app-navbar></app-navbar>

<div class="hiw-page">

  <!-- Hero -->
  <div class="hiw-hero bg-mesh text-center">
    <h1 class="font-display hiw-title">Comment ça <span class="text-gold">marche ?</span></h1>
    <p class="text-muted hiw-sub">Achetez en groupe en 6 étapes simples</p>
  </div>

  <!-- Steps -->
  <div class="hiw-steps">
    <div class="hiw-step" *ngFor="let s of steps; let i = index">
      <div class="hs-num font-display" [class.gold]="i % 2 === 0">{{ s.n }}</div>
      <div class="hs-icon">{{ s.icon }}</div>
      <div class="hs-content">
        <h3 class="font-display hs-title">{{ s.title }}</h3>
        <p class="text-muted hs-desc">{{ s.desc }}</p>
        <p class="hs-detail">{{ s.detail }}</p>
      </div>
    </div>
  </div>

  <!-- FAQ -->
  <div class="hiw-faq">
    <h2 class="font-display faq-title text-center">Questions fréquentes</h2>
    <div class="faq-list">
      <div class="faq-item glass" *ngFor="let f of faqs; let i = index">
        <div class="faq-q" (click)="toggleFaq(i)">
          <span class="font-display">{{ f.q }}</span>
          <span class="faq-arrow" [class.open]="openFaq === i">▾</span>
        </div>
        <div class="faq-a text-muted" *ngIf="openFaq === i">{{ f.a }}</div>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div class="hiw-cta text-center bg-glow-gold">
    <h2 class="font-display" style="font-size:32px;font-weight:800;margin-bottom:12px">
      Prêt à commencer ?
    </h2>
    <p class="text-muted" style="margin-bottom:28px;font-size:16px">
      Rejoignez 5 247 membres et économisez sur vos achats dès aujourd'hui
    </p>
    <button class="btn-gold btn-xl" (click)="goRegister()">Créer mon compte gratuitement 🚀</button>
  </div>
</div>

<app-footer></app-footer>
