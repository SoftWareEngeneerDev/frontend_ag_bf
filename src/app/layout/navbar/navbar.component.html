<!-- Announcement bar -->
<div class="announce-bar">
  <i class="fa-solid fa-truck"></i> Livraison gratuite sur Ouagadougou pour tout groupe de 10+ membres !
  <a routerLink="/groups" style="color:#fff;font-weight:700;margin-left:8px;text-decoration:underline">Voir les groupes →</a>
</div>

<!-- Main navbar -->
<nav class="navbar" [class.scrolled]="scrolled">
  <div class="nb-inner">

    <!-- Left: Logo -->
    <app-logo [size]="20"></app-logo>

    <!-- Center: Nav links (desktop) -->
    <div class="nb-links">
      <a routerLink="/"         routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Accueil</a>
      <a routerLink="/groups"   routerLinkActive="active"><i class="fa-solid fa-fire"></i> Groupes actifs</a>
      <a routerLink="/catalog"  routerLinkActive="active">Catalogue</a>
      <a routerLink="/how-it-works" routerLinkActive="active">Comment ça marche ?</a>
    </div>

    <!-- Right: Actions -->
    <div class="nb-actions">
      <ng-container *ngIf="!auth.isLoggedIn(); else loggedIn">
        <!-- <a routerLink="/auth/login"    class="btn-outline btn-sm nb-desktop-only">Connexion</a> -->
        <button class="btn-outline btn-sm nb-desktop-only" (click)="openLogin()"> Connexion </button>
        <!-- <a routerLink="/auth/register" class="btn-primary btn-sm nb-desktop-only">S'inscrire</a> -->
        <button class="btn-primary btn-sm nb-desktop-only" (click)="openRegister()"> S'inscrire </button>
      </ng-container>

      <ng-template #loggedIn>
        <a routerLink="/member/notifications" class="nb-notif">
          <i class="fa-solid fa-bell"></i>
          <span class="nb-dot" *ngIf="notifs.unreadCount() > 0">{{ notifs.unreadCount() }}</span>
        </a>
        <a [routerLink]="auth.isAdmin() ? '/admin' : auth.isSupplier() ? '/supplier' : '/member'"
           class="btn-primary btn-sm nb-desktop-only">
          Mon espace →
        </a>
      </ng-template>

      <!-- Hamburger (mobile) -->
      <button class="nb-hamburger" (click)="menuOpen = !menuOpen" [class.open]="menuOpen" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<!-- Mobile menu drawer -->
<div class="nb-drawer" [class.open]="menuOpen" (click)="menuOpen=false">
  <div class="nb-drawer-inner" (click)="$event.stopPropagation()">
    <div class="nb-drawer-links">
      <a routerLink="/"             routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="menuOpen=false">
        <i class="fa-solid fa-house"></i> Accueil
      </a>
      <a routerLink="/groups"       routerLinkActive="active" (click)="menuOpen=false">
        <i class="fa-solid fa-fire"></i> Groupes actifs
      </a>
      <a routerLink="/catalog"      routerLinkActive="active" (click)="menuOpen=false">
        <i class="fa-solid fa-grid-2"></i> Catalogue
      </a>
      <a routerLink="/how-it-works" routerLinkActive="active" (click)="menuOpen=false">
        <i class="fa-solid fa-circle-question"></i> Comment ça marche ?
      </a>
    </div>
    <div class="nb-drawer-actions">
      <ng-container *ngIf="!auth.isLoggedIn(); else mobileLoggedIn">
        <a routerLink="/auth/login"    class="btn-outline" (click)="menuOpen=false">
          <i class="fa-solid fa-right-to-bracket"></i> Connexion
        </a>
        <a routerLink="/auth/register" class="btn-primary" (click)="menuOpen=false">
          <i class="fa-solid fa-user-plus"></i> S'inscrire gratuitement
        </a>
      </ng-container>
      <ng-template #mobileLoggedIn>
        <a [routerLink]="auth.isAdmin() ? '/admin' : auth.isSupplier() ? '/supplier' : '/member'"
           class="btn-primary" (click)="menuOpen=false">
          <i class="fa-solid fa-layout-dashboard"></i> Mon espace →
        </a>
      </ng-template>
    </div>
  </div>
</div>

  <!-- LOGIN MODAL -->
  <div class="modal-overlay" *ngIf="showLoginModal" >
    <div class="modal-content" (click)="$event.stopPropagation()">
      
      <!-- Bouton fermer -->
      <button class="modal-close" (click)="closeModal()">×</button>

      <!-- Ton component login -->
      <app-login (switchToRegister)="openRegister()"></app-login>

    </div>
  </div>

  <!-- REGISTER MODAL -->
<div class="modal-overlay" *ngIf="showRegisterModal">
  <div class="modal-content" (click)="$event.stopPropagation()">
    
    <button class="modal-close" (click)="closeModal()">×</button>

    <app-register (switchToLogin)="openLogin()"></app-register>

  </div>
</div>
